name: Update Blocklist

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download blocklist
        run: |
          curl -sf "https://raw.githubusercontent.com/phishdestroy/destroylist/main/rootlist/formats/primary_active/domains.txt" \
            | grep -v '^#' \
            | grep -v '^$' \
            | sed 's/^www\.//' \
            | sort -u > blocklist.txt

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --cached --quiet || git commit -m "chore: update blocklist"
          git push